# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# DATA SOURCE PROPERTIES - PRODUCTION
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useUnicode=yes&characterEncoding=UTF-8&createDatabaseIfNotExist=true&useSSL=true&requireSSL=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.data-source-properties.useUnicode=true
spring.datasource.hikari.data-source-properties.characterEncoding=UTF-8

# Connection pool settings for production
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# TMP DIR
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

tmp_dir=/tmp/


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# URL
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

task.frontend.base.url=


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# AWS SES - EMAIL
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

spring.mail.host=email-smtp.us-east-1.amazonaws.com
spring.mail.username=${SES_USERNAME}
spring.mail.password=${SES_PASSWORD}
mail.from=${SES_FROM_EMAIL}
spring.mail.port=587
spring.mail.properties.mail.smtp.ssl.trust=email-smtp.us-east-1.amazonaws.com
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.debug=false


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# LOGGING - PRODUCTION
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

logging.level.root=INFO
logging.level.lk.taskmanager=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# CloudWatch structured logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# PERFORMANCE TUNING - PRODUCTION
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

# Tomcat thread tuning
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10
server.tomcat.accept-count=100
server.tomcat.max-connections=8192

# Cache settings
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=600s
