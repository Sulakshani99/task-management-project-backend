# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# DATA SOURCE PROPERTIES - DOCKER
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useUnicode=yes&characterEncoding=UTF-8&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.data-source-properties.useUnicode=true
spring.datasource.hikari.data-source-properties.characterEncoding=UTF-8


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# TMP DIR
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

tmp_dir=/tmp/


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# URL
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

task.frontend.base.url=http://localhost:3000


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# AWS SES - EMAIL
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

spring.mail.host=email-smtp.us-east-1.amazonaws.com
spring.mail.username=
spring.mail.password=
mail.from=
spring.mail.port=587
spring.mail.properties.mail.smtp.ssl.trust=email-smtp.us-east-1.amazonaws.com
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.debug=false


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# LOGGING - DOCKER
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

logging.level.root=INFO
logging.level.lk.taskmanager=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
