# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# COMMON DATA
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

server.servlet.context-path=/api
spring.mvc.servlet.path=/v1
appVersion=1.0.0
spring.application.name=task-management


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# LOG
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

logging.file.name=/opt/tomcat/logs/task-management.log
logging.logback.rollingpolicy.file-name-pattern=${logging.file.name}.%d{yyyy-MM-dd}.%i.gz
logging.logback.rollingpolicy.max-history=365
logging.logback.rollingpolicy.max-file-size=20MB
#logging.pattern.console=


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# MAIN PROPERTIES
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

# Profile is set by environment variable (SPRING_PROFILES_ACTIVE) in ECS/Docker
# For local development, set: spring.profiles.active=local
spring.profiles.active=local


# --------------------------------------------------------------------------------------------------------------------------------------------------------------
# REST TEMPLATE
# --------------------------------------------------------------------------------------------------------------------------------------------------------------

logging.level.org.apache.http=INFO
logging.level.httpclient.wire=INFO
